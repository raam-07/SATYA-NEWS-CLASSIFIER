name: Satya Classifier Pipeline

on:
  repository_dispatch:
    types: [trigger-classifier] # <--- LISTEN FOR THIS TRIGGER EVENT
  workflow_dispatch:            # Allows you to still run it manually

concurrency:
  group: satya-classifier
  cancel-in-progress: false  # Wait for running job to finish, don't cancel it

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # Just under GitHub's 6hr limit

    steps:
      # 1. Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Cache pip dependencies for faster runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-satya-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-satya-

      # 4. Install dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install gspread oauth2client llama-cpp-python huggingface_hub libsql

      # 5. Cache the Gemma model so it doesn't download every run
      - name: Cache Gemma Model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./models
          key: gemma-2-9b-it-Q6_K

      # 6. Download the Gemma model only if not cached
      - name: Download Gemma Model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./models
          echo "Downloading Gemma 9B IT model via huggingface_hub..."
          python -c "
          from huggingface_hub import hf_hub_download
          hf_hub_download(
            repo_id='bartowski/gemma-2-9b-it-GGUF',
            filename='gemma-2-9b-it-Q6_K.gguf',
            local_dir='./models'
          )
          "
          echo "Model downloaded successfully."

      # 7. Verify model exists
      - name: Verify Model
        run: |
          ls -lh ./models/

      # 8. Run the classifier
      - name: Run Satya Classifier
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
        run: |
          python satya.py

      # 9. Upload logs as artifact for debugging
      - name: Upload Log File
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satya-classifier-log-${{ github.run_number }}
          path: "*.log"
          retention-days: 7

      # 10. Trigger Entity Updater Instantly
      - name: Trigger Entity Updater Instantly
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ENTITY_UPDATER_PAT }}
          repository: raam-07/satya-entity-library
          event-type: trigger-entity-updater

