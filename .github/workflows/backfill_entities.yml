name: Backfill Article Entities Bridge Table

on:
  workflow_dispatch:

concurrency:
  group: backfill-article-entities
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install libsql

      - name: Run Backfill Script
        env:
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
        run: |
          python backfill_article_entities.py
